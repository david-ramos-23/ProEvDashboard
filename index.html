<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-navbar.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard de gestión del curso Professional Evolution — ProEv" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>ProEv Dashboard</title>
    <!-- Theme init: apply before React renders to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('proev_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <!-- Google Sign-In (GSI) — only used when VITE_GOOGLE_CLIENT_ID is set -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
